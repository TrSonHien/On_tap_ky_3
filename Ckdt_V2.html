<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Linh Kiện Điện Tử - Chuẩn Kiến Thức</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .input-group { @apply flex items-center gap-2 mb-2; }
        .unit-select { @apply bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors; }
        .value-input { @apply bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none font-mono transition-shadow; }
        .question-card:hover { border-color: #a5b4fc; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
        .score-badge { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden flex flex-col">

    <header class="bg-indigo-900 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white text-indigo-900 rounded-full flex items-center justify-center font-bold text-xl shadow-sm">
                <i class="fas fa-microchip"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wide">Luyện Thi Linh Kiện (Đã Hiệu Đính)</h1>
                <p class="text-xs text-indigo-300" id="examId">Mã đề: ---</p>
            </div>
        </div>
        <div class="hidden md:flex items-center gap-4 text-sm">
            <span class="bg-emerald-600 px-3 py-1 rounded-full border border-emerald-500 shadow-sm flex items-center gap-2">
                <i class="fas fa-check-circle"></i> A: Thực tế | B: Chuẩn kiến thức
            </span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 bg-white shadow-xl border-r border-gray-200 flex flex-col z-20 overflow-y-auto shrink-0 relative">
            <div class="p-6 space-y-6">
                <div>
                    <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4 flex items-center"><i class="fas fa-cogs mr-2 text-indigo-600"></i>Cấu Hình</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Số câu hỏi:</label>
                            <input type="number" id="numQuestions" min="1" max="20" value="1" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Số ý lý thuyết/câu:</label>
                            <input type="number" id="numTheory" min="1" max="5" value="2" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-sm">
                        </div>
                        <div class="flex items-center mt-3 pt-3 border-t border-gray-200">
                            <input id="theoryOnlyMode" type="checkbox" class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer">
                            <label for="theoryOnlyMode" class="ml-2 text-sm font-medium text-gray-900 cursor-pointer select-none">Chỉ luyện lý thuyết (10đ)</label>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <button onclick="generateExam()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 flex items-center justify-center gap-2 transform active:scale-[0.98]"><i class="fas fa-random"></i> Tạo Đề Mới</button>
                    <button onclick="checkAll()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-200 flex items-center justify-center gap-2 transform active:scale-[0.98]"><i class="fas fa-check-double"></i> Chấm Tất Cả</button>
                    <button onclick="resetForms()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-200 flex items-center justify-center gap-2 text-sm transform active:scale-[0.98]"><i class="fas fa-undo"></i> Làm Lại</button>
                </div>
                <div class="bg-slate-50 p-4 rounded-lg text-sm text-slate-700 border border-slate-200 mt-auto shadow-inner">
                    <p class="font-bold mb-2 border-b pb-1">Kho Dữ Liệu:</p>
                    <div class="grid grid-cols-2 gap-y-1 gap-x-2 text-xs">
                        <span><i class="fas fa-bolt text-yellow-600 w-4"></i> R: <b id="countR">0</b></span>
                        <span><i class="fas fa-car-battery text-blue-600 w-4"></i> C: <b id="countC">0</b></span>
                        <span><i class="fas fa-magnet text-red-600 w-4"></i> L: <b id="countL">0</b></span>
                        <span><i class="fas fa-book text-green-600 w-4"></i> Q: <b id="countQ">0</b></span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-slate-100 p-4 md:p-8" id="main-scroll">
            <div id="questions-container" class="flex flex-col gap-8 pb-20 max-w-4xl mx-auto w-full"></div>
            <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center text-gray-400">
                <i class="fas fa-clipboard-list text-6xl mb-4 opacity-50"></i>
                <p>Nhấn "Tạo Đề Mới" để bắt đầu</p>
            </div>
        </main>
    </div>

    <script>
        // --- 1. DỮ LIỆU LINH KIỆN (CHUẨN THỰC TẾ) ---
        const resistorBank = [
            { text: "Lam – vàng – cam - đen – vàng kim", val: 643, tol: 5 },
            { text: "Tím – cam – lục – không màu", val: 7300000, tol: 20 },
            { text: "Tím – lục – đỏ - cam – vàng kim", val: 752000, tol: 5 },

            { text: "Lục – trắng – bạch kim – vàng kim", val: 0.59, tol: 5 },
            { text: "Lam – trắng – bạch kim – không màu", val: 0.69, tol: 20 },
            { text: "Lục – xám – đỏ - nâu – vàng kim", val: 5820, tol: 5 },
            { text: "Vàng – trắng – đỏ - nâu – vàng kim", val: 4920, tol: 5 }
        ];

        const capacitorDirectBank = [
            { text: "0.05/500", val: 0.05, volt: 500 },
            { text: "0.05/150", val: 0.05, volt: 150 },
            { text: "0.03/200", val: 0.03, volt: 200 },
            { text: "0.01/150", val: 0.01, volt: 150 },
            { text: "0.05/100", val: 0.05, volt: 100 },
            { text: "0.08/100", val: 0.08, volt: 100 },
            { text: "0.47/200", val: 0.47, volt: 200 },
            { text: "0.68/150", val: 0.68, volt: 150 },
            { text: "0.56/150", val: 0.56, volt: 150 },
            { text: "1.47/200", val: 1.47, volt: 200 }
        ];

        const capacitorCodeBank = [
            { text: "104F/250V", base: 10, exp: 4, tol: 1, volt: 250 }, 
            { text: "107J/150V", base: 10, exp: 7, tol: 5, volt: 150 },
            { text: "106K/150V", base: 10, exp: 6, tol: 10, volt: 150 },
            { text: "106 µ / 100V", base: 10, exp: 6, tol: 20, volt: 100 },
            { text: "105J/50V", base: 10, exp: 5, tol: 5, volt: 50 },
            { text: "107J/150V", base: 10, exp: 7, tol: 5, volt: 150 },
            { text: "105J/150V", base: 10, exp: 5, tol: 5, volt: 150 },
            { text: "103J/200V", base: 10, exp: 3, tol: 5, volt: 200 },
            { text: "104J/200V", base: 10, exp: 4, tol: 5, volt: 200 },
            { text: "105J/150V", base: 10, exp: 5, tol: 5, volt: 150 },
            { text: "105K/150V", base: 10, exp: 5, tol: 10, volt: 150 },
            { text: "105 µ / 150V", base: 10, exp: 5, tol: 20, volt: 150 }
        ];

        const inductorBank = [
            { text: "Lục- đỏ - vàng kim- vàng kim", val: 5.2, tol: 5 },
            { text: "Cam- tím – lam- bạch kim", val: 37000000, tol: 10 },
            { text: "Cam- đỏ - bạch kim – vàng kim", val: 0.32, tol: 5 },
            { text: "Vàng – tím – dỏ - vàng kim", val: 4700, tol: 5 },
            { text: "Đỏ- cam – bạch kim – vàng kim", val: 0.23, tol: 5 },
            { text: "Lục- tím – đỏ - vàng kim", val: 5700, tol: 5 },
            { text: "Trắng – tím – vàng kim – bạch kim", val: 9.7, tol: 10 },
            { text: "Lam- đỏ - xám – bạch kim", val: 6200000000, tol: 10 },
            { text: "Lam – đỏ - vàng kim – bạch kim", val: 6.2, tol: 10 },
            { text: "Lam – tím - đỏ - vàng kim", val: 6700, tol: 5 },
            { text: "Lam - xám – vàng kim- bạch kim", val: 6.8, tol: 10 },
            { text: "Cam – tím – đỏ - vàng kim", val: 3700, tol: 5 },
            { text: "Lam – tím – vàng – bạch kim", val: 670000, tol: 10 },
            { text: "Xám – vàng – đỏ - vàng kim", val: 8400, tol: 5 }
        ];

        // --- NGÂN HÀNG ĐÁP ÁN LÝ THUYẾT (Cập nhật Sửa Lỗi) ---
        const theoryDatabase = [
            { q: "Màn hình cảm ứng kiểu hồng ngoại hoạt động dựa trên nguyên tắc nào?", k: ["ngắt", "tia sáng", "hồng ngoại"], a: "Dựa trên nguyên tắc ngắt các tia sáng hồng ngoại." },
            { q: "Khi có một thay đổi nhỏ trong dòng cực gốc của một transistor thì dòng cực phát của nó sẽ thay đổi như thế nào?", k: ["lớn", "phụ thuộc", "beta", "hệ số"], a: "Dòng cực phát sẽ thay đổi lớn phụ thuộc vào giá trị β (vì IE = (β+1)IB)." },
            { q: "Nếu điện trở bị hở mạch thì dòng qua nó bằng bao nhiêu?", k: ["0", "không", "bằng không"], a: "Bằng 0." },
            { q: "Mạch khuếch đại dùng BJT để có hiệu suất làm việc lớn nhất thì cần chọn điểm làm việc tĩnh tại vị trí nào trên đường tải tĩnh?", k: ["trung điểm", "giữa"], a: "Tại trung điểm trên đường tải tĩnh." },
            { q: "Khi điện áp phân cực thuận tăng từ 5V đến 10V, miền điện tích không gian của lớp chuyển tiếp PN sẽ như thế nào?", k: ["giảm", "hẹp"], a: "Độ rộng vùng điện tích không gian giảm, Điện trường tiếp xúc giảm, Điện thế tiếp xúc trong giảm." },
            { q: "Cảm biến áp suất kiểu tụ hoạt động dựa trên nguyên tắc nào?", k: ["điện dung", "khoảng cách", "biến dạng"], a: "Cảm biến áp suất kiểu tụ hoạt đọng dựa trên nguyên tắc: dựa vào giá trị điện dung để xác định chỉ số áp suất. Khi thay đổi khoảng cách của cực tụ thì điện dung của tụ cũng sẽ thay đổi. Lớp màng bị biến dạng khi có áp suất tác động vào làm cho bản cực lại gần với nhau hoặc kéo bản cực ra xa làm giá trị của tụ thay đổi. Qua hệ thống xử lí của thiết bị cảm biến đo áp suất xác định được áp suất." },
            
            // ĐÃ SỬA: VCE ngắt
            { q: "VCE của một transistor công suất thấp ở trạng thái tắt có giá trị khoảng bao nhiêu?", k: ["xấp xỉ", "nguồn", "VCC"], a: "Xấp xỉ VCC (Điện áp nguồn)." },
            
            { q: "Khi điện áp phân cực ngược tăng từ 5V đến 10V, miền điện tích không gian của lớp chuyển tiếp PN sẽ như thế nào?", k: ["tăng", "rộng"], a: "Hiệu điện thế tiếp xúc tăng (làm I ngược tăng), Độ rộng vùng điện tích không gian tăng, Điện tích vùng chuyển tiếp tăng." },
            { q: "Khi chiếu ánh sáng vào điện trở quang thì giá trị điện trở sẽ như thế nào?", k: ["thay đổi", "bước sóng", "cường độ"], a: "Giá trị điện trở thay đổi theo bước sóng và cường độ sáng chiếu vào." },
            { q: "Phương pháp đo áp suất tĩnh dựa trên nguyên tắc nào?", k: ["lỗ khoan", "biến dạng", "thành bình"], a: "PP1: Đo áp suất chất liệu qua một lỗ được khoan trên thành bình nhờ cảm biến thích hợp; PP2: Đo trực tiếp biến dạng của thành bình do áp suất gây nên." },
            { q: "Khi VDS ≈ VDD thì JFET hoạt động trong chế độ nào?", k: ["khóa kênh", "vùng khóa kênh"], a: "Hoạt động trong chế độ vùng khóa kênh." },
            { q: "Khi không có ánh sáng chiếu vào điện trở quang thì giá trị điện trở sẽ như thế nào?", k: ["nhỏ nhất"], a: "Giá trị điện trở nhỏ nhất." },
            { q: "Một transistor loại pnp trong mạch điện được phân cực với các điện áp tĩnh là VBE = -0.7V; VCE = -0.2 V. Hỏi transistor đó hoạt động ở chế độ nào?", k: ["ngắt"], a: "Hoạt động ở chế độ ngắt." },
            { q: "Phương pháp đo áp suất động hoạt động dựa trên nguyên tắc nào?", k: ["hiệu", "toàn phần", "tĩnh"], a: "Đo hiệu áp suất toàn phần và áp suất tĩnh." },
            
            // ĐÃ SỬA: Năng lượng tạo lỗ trống/điện tử ở bán dẫn thuần
            { q: "Năng lượng gì khiến cho bán dẫn sạch xuất hiện lỗ trống tại nhiệt độ phòng?", k: ["hóa trị"], a: "Năng lượng hóa trị khiến cho bán dẫn mạch xuất hiện lỗ trống tại nhiệt độ phòng." },
            
            { q: "Viết biểu thức tính dòng ID của E-MOSFET kênh P?", k: ["ID", "K", "VGS", "VT"], a: "ID = K(VGS - VT)^2." },
            { q: "Một transistor loại npn trong mạch điện được phân cực với các điện áp tĩnh là VBE = 0.7V; VCE = 0.2 V. Hỏi transistor đó hoạt động ở chế độ nào?", k: ["bão hòa"], a: "Transistor hoạt động ở chế độ bão hòa." },
            { q: "Trong bán dẫn sạch, số lượng điện tử tự do so với số lượng lỗ trống như thế nào?", k: ["bằng", "hằng"], a: "Số lượng điện tử tự do bằng số lượng lỗ trống." },
            { q: "LED là diode phát ra ánh sáng khi điện áp phân cực đặt vào như thế nào?", k: ["thuận", "phân cực thuận"], a: "Điện áp phân cực thuận." },
            { q: "Màn hình cảm ứng kiểu sóng âm hoạt động dựa trên nguyên tắc nào?", k: ["ngắt quãng", "tín hiệu"], a: "Kiểm soát sự ngắt quãng tín hiệu." },
            { q: "MOSFET kênh cảm ứng hoạt động trong vùng Ohmic và vùng ngắt được coi như một thiết bị gì?", k: ["điện trở"], a: "Được coi như điện trở." },
            { q: "Cảm biến áp suất hoạt động dựa trên nguyên tắc nào?", k: ["nguồn tác động", "vi xử lý"], a: "Cần nguồn tác động lên cảm biến đưa giá trị về vi xử lí, vi xử lí tín hiệu rồi được tín hiệu ra." },
            { q: "Nếu điện trở bị đoản mạch thì sụt áp trên nó bằng bao nhiêu?", k: ["0", "không"], a: "Sụt áp trên nó bằng 0." },
            { q: "MOSFET kênh đặt sẵn gần giống như transistor nào?", k: ["D-MOSFET", "DMOSFET"], a: "Gần giống như transistor D-MOSFET." },
            { q: "Cảm biến áp suất kiểu áp trở hoạt động dựa trên nguyên tắc nào?", k: ["biến dạng", "màng", "cấy"], a: "Dựa trên sự biến dạng của cấu trúc màng được chuyển thành tín hiệu điện nhờ cấy trên đó của phần tử điện áp điện trở." },
            { q: "Nguồn điện áp ngoài đặt lên bán dẫn P, nếu đặt cực + bên trái, thì dòng dịch chuyển của hạt tải điện đa số theo chiều nào?", k: ["lỗ trống"], a: "Theo chiều của các hạt lỗ trống." },
            
            // ĐÃ SỬA: N-EMOSFET 0 << VDS << VDD
            { q: "Khi 0 << VDS << VDD thì N- EMOSFET hoạt động trong chế độ nào?", k: ["ohmic", "tuyến tính", "triode"], a: "Vùng OHMIC (Tuyến tính / Triode)." },
            { q: "Khi VDS ≈ 0 thì N- EMOSFET hoạt động trong chế độ nào?", k: ["ôn tính", "vùng ôn tính"], a: "Hoạt động trong vùng ôn tính." },
            
            { q: "Một transistor trong mạch điện được phân cực với các điện áp tĩnh là: VBE = 0V; VCE ≈ VCC. Hỏi transistor đó hoạt động ở chế độ nào?", k: ["ngắt"], a: "Transistor làm việc ở chế độ ngắt." },
            { q: "BJT pnp làm việc ở chế độ tích cực, dòng dịch chuyển chủ yếu giữa các miền chuyển động như thế nào?", k: ["khuyếch tán", "tái hợp", "thiểu số"], a: "Hạt dẫn đa số dễ dàng khuyếch tán qua cực E, tại cực B hạt dẫn bị tái hợp 1 phần, còn lại thiểu số hạt dẫn đi qua chuyển tiếp BC, tạo thành Ic." },
            { q: "Cảm biến gia tốc hoạt động dựa trên nguyên tắc nào?", k: ["áp điện trở", "hiệu ứng"], a: "Hiệu ứng áp điện trở." },
            { q: "Màn hình cảm ứng kiểu điện dung hoạt động dựa trên nguyên tắc nào?", k: ["điện dung", "chạm"], a: "Thay đổi điện dung khi chạm vào màn hình." },
            { q: "Dòng rò trong điốt lý tưởng có giá trị bằng bao nhiêu?", k: ["0", "không"], a: "Bằng 0." },
            { q: "Tụ điện hở mạch hay đoản mạch trong mạch DC, AC?", k: ["hở mạch trong DC", "đoản mạch trong AC"], a: "Tụ điện hở mạch trong mạch DC, đoản mạch trong AC." },

        let currentExamData = [];

        // --- LOGIC CHẤM ĐIỂM (PART A: REALITY, PART B: CORRECTED KNOWLEDGE) ---
        function checkQuestion(id) {
            try {
                const data = currentExamData.find(d => d.id === id);
                if (!data) return;

                let scoreA = 0, scoreB = 0;
                
                // Chấm Phần A
                if (!data.isTheoryOnly) {
                    // R
                    const rVal = parseFloat(document.getElementById(`ans-r-val-${id}`).value);
                    const rUnit = parseFloat(document.getElementById(`ans-r-unit-${id}`).value);
                    const rTol = parseFloat(document.getElementById(`ans-r-tol-${id}`).value);
                    const isR = (Math.abs((rVal * rUnit) - data.r.val) < 0.1) && (rTol == data.r.tol);
                    scoreA += isR ? 1 : 0;
                    displayFeedback(`feed-r-${id}`, isR, `${data.r.val} Ω (±${data.r.tol}%)`);

                    // C1
                    const c1Val = parseFloat(document.getElementById(`ans-c1-val-${id}`).value);
                    const c1Unit = parseFloat(document.getElementById(`ans-c1-unit-${id}`).value);
                    const c1Volt = parseFloat(document.getElementById(`ans-c1-volt-${id}`).value);
                    const isC1 = (Math.abs((c1Val * c1Unit) - data.c1.val) < 0.00001) && (c1Volt == data.c1.volt);
                    scoreA += isC1 ? 1 : 0;
                    displayFeedback(`feed-c1-${id}`, isC1, `${data.c1.val} µF / ${data.c1.volt}V`);

                    // C2 (Code)
                    const base = parseFloat(document.getElementById(`ans-c2-base-${id}`).value);
                    const exp = parseFloat(document.getElementById(`ans-c2-exp-${id}`).value);
                    const tol = parseFloat(document.getElementById(`ans-c2-tol-${id}`).value);
                    const volt = parseFloat(document.getElementById(`ans-c2-volt-${id}`).value);
                    
                    const isC2 = (base == data.c2.base) && (exp == data.c2.exp) && (tol == data.c2.tol) && (volt == data.c2.volt);
                    scoreA += isC2 ? 1 : 0;
                    displayFeedback(`feed-c2-${id}`, isC2, `${data.c2.base} . 10^${data.c2.exp} µF (±${data.c2.tol}%) / ${data.c2.volt}V`);

                    // L
                    const lVal = parseFloat(document.getElementById(`ans-l-val-${id}`).value);
                    const lTol = parseFloat(document.getElementById(`ans-l-tol-${id}`).value);
                    const isL = (Math.abs(lVal - data.l.val) < 0.01) && (lTol == data.l.tol);
                    scoreA += isL ? 1 : 0;
                    displayFeedback(`feed-l-${id}`, isL, `${data.l.val} µH (±${data.l.tol}%)`);
                }

                // Chấm Phần B
                const maxScoreB = data.isTheoryOnly ? 10 : 6;
                const pointsPerQ = maxScoreB / data.theory.length;
                
                data.theory.forEach((t, idx) => {
                    const el = document.getElementById(`theory-ans-${id}-${idx}`);
                    const userAns = el ? el.value.toLowerCase() : "";
                    if(!userAns) {
                        showTheoryFeed(`theory-feed-${id}-${idx}`, 0, t.a, []);
                        return;
                    }
                    const foundKw = t.k.filter(k => userAns.includes(k.toLowerCase()));
                    const ratio = foundKw.length / t.k.length;
                    scoreB += ratio * pointsPerQ;
                    showTheoryFeed(`theory-feed-${id}-${idx}`, ratio, t.a, foundKw);
                });

                // Display Score
                const total = scoreA + scoreB;
                const badge = document.getElementById(`score-badge-${id}`);
                badge.className = `ml-4 font-bold text-lg score-badge ${total >= 8 ? 'text-green-600' : (total >= 5 ? 'text-yellow-600' : 'text-red-600')}`;
                badge.innerHTML = `<i class="fas fa-chart-line"></i> ${total.toFixed(1)}/10`;
                badge.classList.remove('hidden');
            } catch (err) {
                console.error("Lỗi khi chấm câu hỏi:", err);
            }
        }

        function checkAll() {
            try {
                if(!currentExamData || currentExamData.length === 0) return;
                currentExamData.forEach(d => checkQuestion(d.id));
                document.getElementById('main-scroll').scrollTop = 0; // Scroll to top
            } catch (err) {
                alert("Có lỗi xảy ra khi chấm bài. Vui lòng thử lại.");
            }
        }

        function displayFeedback(elId, isRight, msg) {
            const el = document.getElementById(elId);
            if(!el) return;
            const colorClass = isRight ? "bg-green-50 border-green-200 text-green-800" : "bg-red-50 border-red-200 text-red-800";
            el.className = `mt-2 text-sm p-2 rounded border ${colorClass}`;
            el.innerHTML = isRight ? `<i class="fas fa-check"></i> Chính xác!` : `<i class="fas fa-times"></i> Sai. Đáp án: <b>${msg}</b>`;
            el.classList.remove('hidden');
        }

        function showTheoryFeed(elId, ratio, ans, found) {
            const el = document.getElementById(elId);
            if(!el) return;
            
            let bgClass = "bg-red-50 border-red-200 text-red-800";
            let icon = "times";
            let msg = "Chưa chính xác.";

            if(ratio == 1) {
                bgClass = "bg-green-50 border-green-200 text-green-800";
                icon = "check-double";
                msg = "Xuất sắc!";
            } else if (ratio > 0) {
                bgClass = "bg-yellow-50 border-yellow-200 text-yellow-800";
                icon = "check";
                msg = "Khá tốt, nhưng thiếu ý.";
            }

            el.className = `mt-3 text-sm p-4 rounded-lg border ${bgClass}`;
            el.innerHTML = `
                <div class="flex gap-3">
                    <i class="fas fa-${icon} text-xl mt-1"></i>
                    <div>
                        <div class="font-bold mb-1">${msg}</div>
                        <div class="text-xs mb-2">✅ Ý đúng: ${found.length > 0 ? found.join(', ') : 'Chưa có'}</div>
                        <div class="pt-2 border-t border-opacity-20 border-black italic">📖 Đáp án: ${ans}</div>
                    </div>
                </div>
            `;
            el.classList.remove('hidden');
        }

        function resetForms() {
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
            document.querySelectorAll('.feedback, [id^="theory-feed-"], [id^="score-badge-"]').forEach(e => e.classList.add('hidden'));
        }

        window.onload = generateExam;
    </script>
</body>
</html>
